# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: whatdidgiudo
email: giujutsus@proton.me
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: whatdidgiudo
github_username:  g3dms

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

include:
  - assets/css

# Site settings
title: whatdidgiudo
email: giujutsus@proton.me
author: lee
description: >- 
  rentry layouts, neocities shrines, watermarks, posters, edits.
  digital stuff with personality.
url: "https://whatdidgiudo.neocities.org" 
baseurl: "" 

# Branding
logo_text: WHATDIDGIUDO
nav_separator: "𖹭"
max_width: "1300px"
font_family: "'Helvetica Neue', 'Arial', -apple-system, BlinkMacSystemFont, sans-serif"

# Colors
colors:
  background: "#0a0a0a"
  text: "#ffffff"
  accent: "#ff66b2"
  muted: "#888888"

navigation:
  - name: PORTFOLIO
    link: /portfolio/
  - name: FREEBIES
    link: /freebies/
  - name: ABOUT
    link: /aboutme/
  - name: BLOG
    link: /blog/
  - name: CONTACT
    link: /contact/

social:
  - name: TWITTER
    url: https://twitter.com/whatdidgiudo
  - name: TUMBLR
    url: https://tumblr.com/yourblog
  - name: EMAIL
    url: mailto:your@email.com

favicon: /assets/images/favicon.ico
url_text: "whatdidgiudo.neocities.org"

markdown: kramdown
permalink: pretty

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      description: "digital stuff by lee"